# Common IC error signatures for PSpice/SPICE netlists
# Each entry: ic, error_type, symptom, root_cause, fix, example

- ic: LM741
  error_type: pinout_mismatch
  symptom: Op-amp output stays at V- or doesn't respond to input
  root_cause: LM741 pins 1 and 5 (offset null) swapped with inputs, or V+/V- reversed
  fix: "Verify pin order: 1=Null, 2=IN-, 3=IN+, 4=V-, 5=Null, 6=OUT, 7=V+"
  example: "X1 0 2 3 4 0 6 7 LM741  -> X1(1:null 2:in- 3:in+ 4:v- 5:null 6:out 7:v+)"

- ic: LM358
  error_type: pinout_mismatch
  symptom: Wrong output or no output; section confusion
  root_cause: LM358 is dual op-amp; mixing section A (pins 1-3) and B (pins 5-7) pins
  fix: "Section A: 1=OUT, 2=IN-, 3=IN+, 4=V-, 8=V+. Section B: 5=IN+, 6=IN-, 7=OUT"
  example: "X1 1 2 3 4 8 LM358  -> section A: OUT=1, IN-=2, IN+=3, V-=4, V+=8"

- ic: LM324
  error_type: pinout_mismatch
  symptom: Incorrect output or supply confusion
  root_cause: LM324 has 4 op-amps; V+ is pin 4, V- is pin 11 (unusual ordering)
  fix: "V+ = pin 4, V- (GND) = pin 11. Section A: 1=OUT, 2=IN-, 3=IN+"
  example: "X1 1 2 3 4 11 LM324"

- ic: NE5532
  error_type: pinout_mismatch
  symptom: Wrong output or oscillation
  root_cause: Pinout differs from LM358; compensation pins may need connection
  fix: "Section A: 1=OUT, 2=IN-, 3=IN+, 4=V-, 8=V+. No offset null pins."
  example: "X1 1 2 3 4 8 NE5532"

- ic: TL081
  error_type: pinout_mismatch
  symptom: No output or offset null pins floating causing drift
  root_cause: TL081 has offset null pins (1,5) that must be connected or left NC
  fix: "1=Null, 2=IN-, 3=IN+, 4=V-, 5=Null, 6=OUT, 7=V+, 8=NC. Connect pins 1,5 to pot or leave NC"
  example: "X1 1 2 3 4 5 6 7 8 TL081"

- ic: 2N2222
  error_type: transistor_pinout
  symptom: Wrong gain or no amplification
  root_cause: Q-device in PSpice uses E,B,C order but some libraries use C,B,E
  fix: "PSpice Q-device: Qxxx C B E modelname. Subcircuit packages: check pin order."
  example: "Q1 C B E Q2N2222  (C=collector, B=base, E=emitter)"

- ic: 2N3904
  error_type: transistor_pinout
  symptom: Same as 2N2222 issues
  root_cause: Same E/B/C vs C/B/E confusion
  fix: "Same as 2N2222. Subcircuit models may have different pin order."
  example: "Q1 C B E Q2N3904 or X1 E B C Q2N3904 (check .subckt)"

- ic: LM317
  error_type: regulator_pinout
  symptom: Output voltage doesn't match formula or no output
  root_cause: ADJ, VOUT, VIN pins connected incorrectly
  fix: "1=ADJ, 2=VOUT, 3=VIN (TO-220 package). Connect ADJ to GND via resistor."
  example: "X1 3 2 1 LM317  (VIN=3, VOUT=2, ADJ=1)"

- ic: LM337
  error_type: regulator_pinout
  symptom: Negative voltage not regulated
  root_cause: Pinout different from LM317; VIN/VOUT swapped
  fix: "1=ADJ, 2=VIN, 3=VOUT (TO-220). Note: VIN and VOUT are REVERSED vs LM317."
  example: "X1 3 1 2 LM337  (actually: 1=ADJ, 2=VIN, 3=VOUT)"

- ic: "7805"
  error_type: regulator_pinout
  symptom: No output or wrong voltage
  root_cause: IN/OUT/GND miswired
  fix: "1=IN, 2=GND, 3=OUT (TO-220). Input needs 2V dropout above output."
  example: "X1 1 2 3 7805"

- ic: "7905"
  error_type: regulator_pinout
  symptom: No negative output
  root_cause: Pinout differs from 7805
  fix: "1=GND, 2=IN, 3=OUT (TO-220). Different from 7805!"
  example: "X1 2 1 3 7905"

- ic: CFOA_AD844
  error_type: pinout_mismatch
  symptom: Wrong transfer function or oscillation
  root_cause: "CFOA pinout differs from VFA op-amp. AD844: 1=null, 2=IN-, 3=IN+, 4=V-, 5=null, 6=OUT, 7=V+, 8=CZ"
  fix: "Note: pin 8 (CZ) is current output — must be loaded or connected properly"
  example: "X1 1 2 3 4 5 6 7 8 AD844"

- ic: LM393
  error_type: comparator_pinout
  symptom: Output doesn't swing or stays high
  root_cause: Open-collector output needs pull-up resistor; pinout confusion with op-amp
  fix: "Section A: 1=OUT, 2=IN-, 3=IN+, 4=V-, 8=V+. Output is open-collector: add pull-up R."
  example: "R1 1 VCC 10K  ; pull-up on output pin 1"

- ic: general_opamp
  error_type: missing_supply
  symptom: No output or output stuck
  root_cause: Op-amp V+ and V- supply pins not connected to DC sources
  fix: "Add V+ and V- voltage sources (e.g., VCC VCC 0 DC 15, VEE VEE 0 DC -15)"
  example: "VCC VCC 0 DC 15  ; VEE VEE 0 DC -15  ; X1 2 3 1 VCC VEE LM741"

- ic: general_opamp
  error_type: no_feedback
  symptom: Output at rail
  root_cause: Open-loop operation without feedback resistor
  fix: "Add feedback resistor from output to IN- (inverting input)"
  example: "Rf out in- 10k"

- ic: general_opamp
  error_type: missing_input_bias_path
  symptom: Output at rail or saturated
  root_cause: No DC path from op-amp inputs to ground (AC coupling without bias R)
  fix: "Add resistor (10k-100k) from IN+ to GND for DC bias path"
  example: "Rb in+ 0 10k  ; bias resistor for AC-coupled input"

- ic: diode_1N4148
  error_type: wrong_model
  symptom: Diode doesn't conduct or breaks down early
  root_cause: Model parameters wrong; used 1N4007 instead of 1N4148 (different speed/current)
  fix: "Use correct model. 1N4148: fast switching (4ns), 100V, 200mA. 1N4007: rectifier, 1A, 1000V."
  example: ".model D1N4148 D(IS=0.1pA RS=8 BV=100 CJO=2pF TT=5n)"

- ic: MOSFET_BS170
  error_type: pinout_mismatch
  symptom: MOSFET doesn't switch
  root_cause: "BS170 pinout: S=1, D=2, G=3 (different from standard G-D-S)"
  fix: "BS170 pinout (TO-92): 1=Source, 2=Drain, 3=Gate. Not G-D-S!"
  example: "M1 2 3 1 0 BS170  (D=1(2), G=3, S=1(1))"
